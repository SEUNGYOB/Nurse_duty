<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Couple</title>
  <script>
    // PWA로 설치된 경우 바로 앱으로 이동
    if (window.matchMedia("(display-mode: standalone)").matches || navigator.standalone) {
      window.location.replace("/app.html");
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #F8F6FB;
      color: #18202a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 헤더 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #18202a;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: #A794C4;
    }

    /* 히어로 섹션 */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at top left, #EDE4FF 0%, transparent 55%),
        radial-gradient(ellipse at bottom right, #FFD6E8 0%, transparent 50%),
        radial-gradient(ellipse at center, #d8d8e8 0%, transparent 60%),
        #F8F6FB;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 60px 28px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 600;
      color: #A794C4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(38px, 9vw, 72px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #18202a;
      margin-bottom: 28px;
    }

    .hero-title em {
      font-style: normal;
      color: #A794C4;
    }

    .hero-sub {
      font-size: 17px;
      color: #66707b;
      line-height: 1.6;
      max-width: 340px;
      margin-bottom: 40px;
    }

    .cta-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 60px;
    }

    .btn-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #18202a;
      color: white;
      padding: 16px 28px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-cta:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      color: #66707b;
      padding: 14px 28px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 500;
      border: 1.5px solid rgba(167,148,196,0.35);
      cursor: pointer;
      text-decoration: none;
    }

    /* 카드 섹션 - 기능 강조 */
    .feature-card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(215, 191, 255, 0.3);
      border-radius: 24px;
      padding: 24px;
      margin: 0 0 16px;
    }

    .feature-icon {
      font-size: 32px;
      margin-bottom: 14px;
    }

    .feature-label {
      font-size: 11px;
      font-weight: 600;
      color: #A794C4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .feature-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .feature-desc {
      font-size: 14px;
      color: #66707b;
      line-height: 1.6;
    }

    /* 스크린샷 업로드 강조 */
    .ocr-card {
      background: linear-gradient(135deg, #EDE4FF, #D7BFFF);
      border-radius: 24px;
      padding: 28px 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .ocr-card::after {
      content: "";
      position: absolute;
      bottom: -20px;
      right: -20px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
    }

    .ocr-step {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .ocr-step:last-child { margin-bottom: 0; }

    .ocr-num {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #6E5BA8;
      flex-shrink: 0;
    }

    .ocr-text strong {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #18202a;
      margin-bottom: 2px;
    }

    .ocr-text span {
      font-size: 13px;
      color: #6E5BA8;
    }

    /* 듀티 배지 미리보기 */
    .duty-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .duty-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .duty-badge.day    { background: #FFD166; color: #7a5c00; }
    .duty-badge.eve    { background: #F4A261; color: white; }
    .duty-badge.night  { background: #2A4E7C; color: white; }
    .duty-badge.off    { background: #C4B5D4; color: #5a4a6a; }

    /* 하단 여백 */
    .bottom-pad { height: 80px; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-gradient"></div>

    <header class="header">
      <div class="logo">Nurse<span>Couple</span></div>
    </header>

    <div class="hero-content">
      <div class="eyebrow">간호사 듀티 공유 앱</div>

      <h1 class="hero-title">
        근무표 사진 한 장,<br>
        두 사람의<br>
        <em>일정이 됩니다.</em>
      </h1>

      <p class="hero-sub">
        사진만 찍으면 자동으로 입력돼요.<br>
        상대방과 공유하고 함께 보는 달력.
      </p>

      <div class="cta-wrap">
        <a href="./app.html" class="btn-cta">
          📅 지금 시작하기
        </a>
        <a href="#how" class="btn-secondary">
          어떻게 작동하나요?
        </a>
      </div>

      <!-- OCR 기능 강조 카드 -->
      <div class="ocr-card" id="how">
        <div class="feature-label">핵심 기능</div>
        <div class="feature-title" style="margin-bottom:20px; color:#18202a">📸 사진 → 자동 입력</div>

        <div class="ocr-step">
          <div class="ocr-num">1</div>
          <div class="ocr-text">
            <strong>근무표 사진 찍기</strong>
            <span>병동 근무표 사진을 그대로 올려요</span>
          </div>
        </div>
        <div class="ocr-step">
          <div class="ocr-num">2</div>
          <div class="ocr-text">
            <strong>AI가 자동 인식</strong>
            <span>내 이름 선택하면 듀티가 자동으로 채워져요</span>
          </div>
        </div>
        <div class="ocr-step">
          <div class="ocr-num">3</div>
          <div class="ocr-text">
            <strong>링크 공유</strong>
            <span>코드 하나로 상대방 달력과 합쳐서 보기</span>
          </div>
        </div>
      </div>

      <!-- 듀티 타입 미리보기 -->
      <div class="feature-card">
        <div class="feature-label">근무 유형</div>
        <div class="feature-title">한눈에 보이는 듀티</div>
        <div class="duty-preview">
          <span class="duty-badge day">Day</span>
          <span class="duty-badge eve">Evening</span>
          <span class="duty-badge night">Night</span>
          <span class="duty-badge off">OFF</span>
        </div>
      </div>

      <div class="bottom-pad"></div>
    </div>
  </div>
</body>
</html>
